# ================================================================
# 问玄东方 C端 iOS App - XcodeGen 工程配置
# 生成方式：在 apps/ios-customer 目录下执行 `xcodegen generate`
# ================================================================

name: DongFangApp
options:
  bundleIdPrefix: com.dongfang
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: zh-Hans
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_PREVIEWS: YES
    SWIFT_STRICT_CONCURRENCY: minimal
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: DongFangApp/Resources/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.dongfang.customer
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    DEVELOPMENT_TEAM: ""

configs:
  Debug: debug
  Release: release

packages:
  OpenIMSDKiOS:
    url: https://github.com/openimsdk/openim-sdk-ios.git
    from: 3.8.0

targets:
  DongFangApp:
    type: application
    platform: iOS
    sources:
      - path: DongFangApp
        excludes:
          - "Resources/Info.plist"
    dependencies:
      - package: OpenIMSDKiOS
    settings:
      base:
        INFOPLIST_FILE: DongFangApp/Resources/Info.plist
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          OTHER_SWIFT_FLAGS: "-DDEBUG"
    info:
      path: DongFangApp/Resources/Info.plist
      properties:
        CFBundleDisplayName: 问玄东方
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
