# ================================================================
# 问玄东方 P03 法师工作台 iOS App - XcodeGen 工程配置
# 生成方式：在 apps/ios-master 目录下执行 `xcodegen generate`
# ================================================================

name: MasterApp
options:
  bundleIdPrefix: com.askxuan
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: zh-Hans
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_PREVIEWS: YES
    SWIFT_STRICT_CONCURRENCY: minimal
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: MasterApp/Resources/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.askxuan.master
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    DEVELOPMENT_TEAM: ""

configs:
  Debug: debug
  Release: release

targets:
  MasterApp:
    type: application
    platform: iOS
    sources:
      - path: MasterApp
        excludes:
          - "Resources/Info.plist"
    settings:
      base:
        INFOPLIST_FILE: MasterApp/Resources/Info.plist
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          OTHER_SWIFT_FLAGS: "-DDEBUG"
    info:
      path: MasterApp/Resources/Info.plist
      properties:
        CFBundleDisplayName: 问玄东方
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
